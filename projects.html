<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | DK DigitalStudio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f7f4ef;
            --bg-alt: #f0ebe3;
            --text: #2b2b2b;
            --muted: #6f6f6f;
            --primary: #1b2233;
            --gold: #c9a86a;
            --card: #ffffff;
            --border: #e0d6c7;
        }

        body.dark {
            --bg: #11131a;
            --bg-alt: #181b24;
            --text: #f3f0ea;
            --muted: #b3aa9a;
            --primary: #f3f0ea;
            --card: #1b1f2a;
            --border: #3a3f4f;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 14px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(247, 244, 239, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        body.dark nav {
            background: rgba(17, 19, 26, 0.96);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .brand span {
            color: var(--gold);
        }

        .nav-links a {
            margin-left: 24px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.25s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .toggle-btn {
            margin-left: 24px;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid var(--gold);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            cursor: pointer;
            background: transparent;
            color: var(--gold);
        }

        /* HEADER */
        header {
            padding: 140px 10% 80px;
            background: linear-gradient(135deg, #1b2233, #252c3f);
            color: #f7f4ef;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 14px;
        }

        .hero-sub {
            max-width: 600px;
            font-size: 15px;
            color: #e4ded2;
        }

        /* MAIN */
        main {
            padding: 70px 10% 60px;
        }

        section {
            margin-bottom: 70px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s ease;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-label {
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 11px;
            color: var(--muted);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin: 10px 0 18px;
            position: relative;
        }

        h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 70px;
            height: 2px;
            background: var(--gold);
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 20px 0 30px;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-alt);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--gold);
            color: #1b2233;
            border-color: var(--gold);
        }

        /* PROJECT GRID */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 26px;
        }

        .project-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 18px;
            transition: 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .project-thumb {
            width: 100%;
            height: 180px;
            background: var(--bg-alt);
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .project-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .project-desc {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .btn-view {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            display: inline-block;
        }

        /* FOOTER */
        footer {
            padding: 26px 10% 30px;
            border-top: 1px solid var(--border);
            background: var(--bg-alt);
            font-size: 12px;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-social {
            display: flex;
            gap: 14px;
            font-size: 12px;
        }

        .footer-social a {
            color: var(--muted);
        }

        .footer-social a:hover {
            color: var(--gold);
        }

        @media (max-width: 900px) {
            nav { padding: 12px 6%; }
            header { padding: 120px 6% 60px; }
            main { padding: 60px 6% 50px; }
        }
    </style>
</head>

<body>

<nav>
    <div class="brand">DK <span>DigitalStudio</span></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="#projects">Projects</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-btn" onclick="toggleDark()">Dark Mode</button>
    </div>
</nav>

<header>
    <h1 class="hero-title">Selected Work & Case Studies</h1>
    <p class="hero-sub">
        A curated collection of applications, platforms, and interfaces crafted with precision,
        performance, and luxury‑grade design principles.
    </p>
</header>

<main>

    <!-- FILTERS -->
    <section id="projects">
        <div class="section-label">Portfolio</div>
        <h2>Explore by category.</h2>

        <div class="filters">
            <button class="filter-btn active" onclick="filterProjects('all')">All</button>
            <button class="filter-btn" onclick="filterProjects('dotnet')">.NET</button>
            <button class="filter-btn" onclick="filterProjects('angular')">Angular</button>
            <button class="filter-btn" onclick="filterProjects('ui')">UI</button>
            <button class="filter-btn" onclick="filterProjects('fullstack')">
