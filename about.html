<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | DK DigitalStudio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f7f4ef;
            --bg-alt: #f0ebe3;
            --text: #2b2b2b;
            --muted: #6f6f6f;
            --primary: #1b2233;
            --gold: #c9a86a;
            --card: #ffffff;
            --border: #e0d6c7;
        }

        body.dark {
            --bg: #11131a;
            --bg-alt: #181b24;
            --text: #f3f0ea;
            --muted: #b3aa9a;
            --primary: #f3f0ea;
            --card: #1b1f2a;
            --border: #3a3f4f;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 14px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(247, 244, 239, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        body.dark nav {
            background: rgba(17, 19, 26, 0.96);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .brand span {
            color: var(--gold);
        }

        .nav-links a {
            margin-left: 24px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.25s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .toggle-btn {
            margin-left: 24px;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid var(--gold);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            cursor: pointer;
            background: transparent;
            color: var(--gold);
        }

        header {
            padding: 140px 10% 80px;
            background: linear-gradient(135deg, #1b2233, #252c3f);
            color: #f7f4ef;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 14px;
        }
